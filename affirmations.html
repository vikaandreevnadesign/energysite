<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Аффирмации — Тёмная версия | Вика Кокурина</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{overflow:hidden}
body{background:#0a0814;font-family:'Jost',sans-serif;color:#e8dfd0;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
.bg{position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 60% 50% at 20% 20%,rgba(138,90,180,0.18) 0%,transparent 70%),
    radial-gradient(ellipse 50% 40% at 80% 80%,rgba(90,140,180,0.14) 0%,transparent 70%),
    radial-gradient(ellipse 40% 60% at 50% 50%,rgba(180,120,80,0.08) 0%,transparent 80%)}
.stars{position:fixed;inset:0;z-index:0;
  background-image:
    radial-gradient(1px 1px at 15% 20%,rgba(255,255,255,0.4) 0%,transparent 100%),
    radial-gradient(1px 1px at 35% 60%,rgba(255,255,255,0.3) 0%,transparent 100%),
    radial-gradient(1px 1px at 65% 15%,rgba(255,255,255,0.4) 0%,transparent 100%),
    radial-gradient(1px 1px at 80% 45%,rgba(255,255,255,0.25) 0%,transparent 100%),
    radial-gradient(1px 1px at 50% 80%,rgba(255,255,255,0.35) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 90% 10%,rgba(255,255,255,0.5) 0%,transparent 100%),
    radial-gradient(1px 1px at 10% 70%,rgba(255,255,255,0.3) 0%,transparent 100%),
    radial-gradient(1px 1px at 70% 90%,rgba(255,255,255,0.2) 0%,transparent 100%)}
.wrap{position:relative;z-index:1;max-width:460px;width:100%;padding:36px 22px;text-align:center}
.eyebrow{font-size:10px;letter-spacing:0.28em;text-transform:uppercase;color:rgba(200,170,230,0.6);margin-bottom:14px}
h1{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:300;color:#f0e8d8;line-height:1.3;margin-bottom:8px}
h1 em{font-style:italic;color:#c9a8e8}
.sub{font-size:13px;color:rgba(220,210,195,0.55);margin-bottom:26px;font-weight:300;line-height:1.6}

/* CATEGORIES */
.cats{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin-bottom:26px}
.cat{padding:7px 15px;border-radius:30px;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;transition:all 0.22s;border:1px solid rgba(180,130,220,0.25);background:transparent;color:rgba(200,160,240,0.6);font-family:'Jost',sans-serif}
.cat.active{background:linear-gradient(135deg,rgba(140,90,200,0.4),rgba(80,110,180,0.35));border-color:rgba(180,130,240,0.5);color:#e0d0f8;box-shadow:0 4px 16px rgba(120,70,200,0.25)}
.cat:hover{border-color:rgba(180,130,240,0.4);color:#d8c8f0}

/* CARD */
.card{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(180,140,220,0.2);
  border-radius:24px;padding:40px 30px;
  min-height:200px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  margin-bottom:24px;
  box-shadow:0 8px 40px rgba(0,0,0,0.4);
  position:relative;overflow:hidden;
  transition:opacity 0.35s,transform 0.35s;
  backdrop-filter:blur(8px);
}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(200,150,240,0.4),transparent)}
.card.fade{opacity:0;transform:scale(0.97)}
.card-cat{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:rgba(180,130,220,0.6);margin-bottom:14px}
.card-text{font-family:'Cormorant Garamond',serif;font-size:21px;font-weight:300;line-height:1.75;color:#ede5d8;font-style:italic}
.idle-symbol{font-size:36px;opacity:0.3;animation:pulse 3s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:0.2;transform:scale(1)}50%{opacity:0.5;transform:scale(1.06)}}
.idle-text{font-family:'Cormorant Garamond',serif;font-size:15px;font-style:italic;color:rgba(200,160,240,0.4);margin-top:10px}

/* BUTTONS */
.btns{display:flex;flex-direction:column;align-items:center;gap:11px}
.btn-main{background:linear-gradient(135deg,rgba(140,90,200,0.35),rgba(80,110,180,0.3));border:1px solid rgba(180,140,230,0.4);color:#e0d0f8;padding:15px 52px;border-radius:40px;font-family:'Jost',sans-serif;font-size:13px;letter-spacing:0.15em;text-transform:uppercase;cursor:pointer;transition:all 0.27s;box-shadow:0 8px 28px rgba(0,0,0,0.3)}
.btn-main:hover{background:linear-gradient(135deg,rgba(140,90,200,0.5),rgba(80,110,180,0.45));transform:translateY(-2px);box-shadow:0 12px 36px rgba(120,70,200,0.3)}
.btn-row{display:flex;gap:9px}
.btn-sec{background:transparent;border:1px solid rgba(180,130,220,0.25);color:rgba(200,160,240,0.7);padding:10px 24px;border-radius:30px;font-family:'Jost',sans-serif;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:all 0.22s}
.btn-sec:hover{background:rgba(180,130,220,0.1);border-color:rgba(180,130,240,0.5);color:#d8c8f0}

.saved-msg{margin-top:16px;background:rgba(255,255,255,0.04);border:1px solid rgba(180,140,220,0.2);border-radius:11px;padding:12px 18px;font-size:12px;color:rgba(200,170,230,0.65);line-height:1.6;display:none}
.saved-msg strong{font-weight:500;color:rgba(200,170,230,0.9)}
.counter{font-size:11px;color:rgba(180,140,210,0.35);margin-top:14px}
.author{margin-top:24px;font-size:10px;letter-spacing:0.12em;color:rgba(160,130,190,0.3);text-transform:uppercase}
</style>
</head>
<body>
<div class="bg"></div>
<div class="stars"></div>
<div class="wrap">
  <div class="eyebrow">Вика Кокурина · Аффирмации</div>
  <h1>Послание<br><em>на сегодня</em></h1>
  <p class="sub">Выбери тему — получи аффирмацию дня</p>

  <div class="cats">
    <button class="cat active" data-cat="all" onclick="setCat(this)">✦ Все</button>
    <button class="cat" data-cat="money" onclick="setCat(this)">💰 Деньги</button>
    <button class="cat" data-cat="home" onclick="setCat(this)">🏠 Дом</button>
    <button class="cat" data-cat="conf" onclick="setCat(this)">🌙 Уверенность</button>
    <button class="cat" data-cat="energy" onclick="setCat(this)">✨ Энергия</button>
  </div>

  <div class="card" id="card">
    <div class="idle-symbol">✦</div>
    <div class="idle-text">Нажми кнопку ниже</div>
  </div>

  <div class="btns">
    <button class="btn-main" onclick="generate()">✦ Получить аффирмацию</button>
    <div class="btn-row">
      <button class="btn-sec" onclick="generate()">↻ Другая</button>
      <button class="btn-sec" onclick="saveAff()">♡ Сохранить</button>
    </div>
  </div>

  <div class="saved-msg" id="savedMsg">
    <strong>♡ Сохранена!</strong><br>
    Сделай скрин и поделись с подругой, которой это нужно сегодня
  </div>
  <div class="counter" id="counter"></div>
  <div class="author">@kowiktori · Энерготерапевт · Астролог</div>
</div>

<script>
const D = {
  money:{l:"💰 Деньги и изобилие",a:[
    "Деньги приходят ко мне легко, часто и из разных источников",
    "Я достойна процветания и принимаю его с благодарностью",
    "Мои финансы растут, пока я занимаюсь любимым делом",
    "Я открыта к изобилию во всех его проявлениях",
    "Деньги — это энергия, и я умею с ней работать",
    "Я отпускаю страх бедности и выбираю уверенность в достатке",
    "Богатство течёт ко мне естественно и радостно",
    "Я позволяю себе зарабатывать столько, сколько мне нужно",
    "Мои услуги ценны, и я принимаю достойную оплату за них",
    "Каждый день я создаю новые возможности для дохода"
  ]},
  home:{l:"🏠 Дом и пространство",a:[
    "Мой идеальный дом уже существует и ждёт меня",
    "Я создаю пространство, наполненное теплом и любовью",
    "Каждый переезд — это шаг навстречу лучшей версии моей жизни",
    "Я доверяю процессу поиска своего дома",
    "Мой дом — отражение моего внутреннего состояния. Оба прекрасны",
    "Правильное решение по недвижимости приходит ко мне легко",
    "Я в безопасности в любом пространстве, которое выбираю",
    "Вселенная помогает мне найти дом мечты в нужное время",
    "Я доверяю своей интуиции при выборе жилья",
    "Мой новый дом наполнен светом, покоем и радостью"
  ]},
  conf:{l:"🌙 Уверенность и проявленность",a:[
    "Я разрешаю себе занимать место и быть видимой",
    "Мой голос важен. Мои слова нужны людям",
    "Я готова прямо сейчас — ждать идеального момента больше не нужно",
    "Я доверяю своей интуиции и следую за ней",
    "Моя уникальность — это моя сила, а не слабость",
    "Я имею право говорить, учить и помогать",
    "С каждым днём я становлюсь увереннее в себе",
    "Я отпускаю страх осуждения и выбираю свободу выражения",
    "Я достаточно знаю, чтобы помогать. Я готова",
    "Люди находят меня, потому что им нужно именно то, что я несу"
  ]},
  energy:{l:"✨ Энергия и состояние",a:[
    "Я наполнена энергией жизни и передаю её окружающим",
    "Моё тело мудро. Я слышу его и доверяю ему",
    "Я отпускаю то, что больше мне не служит, с лёгкостью и благодарностью",
    "Я в потоке. Всё, что мне нужно, приходит в нужный момент",
    "Моя энергия привлекает то, что соответствует моей душе",
    "Я выбираю состояние радости и покоя прямо сейчас",
    "Я исцеляю себя и помогаю исцеляться другим",
    "Мои мысли созидательны. Я творю реальность, которую хочу",
    "Я в гармонии с собой, с людьми и с миром вокруг",
    "Мои границы — это любовь к себе. Я держу их с достоинством"
  ]}
};
const all=Object.entries(D).flatMap(([k,v])=>v.a.map(t=>({k,l:v.l,t})));
let cat='all',shown=0,last=null;
function setCat(el){document.querySelectorAll('.cat').forEach(c=>c.classList.remove('active'));el.classList.add('active');cat=el.dataset.cat}
function getPool(){if(cat==='all')return all;const v=D[cat];return v?v.a.map(t=>({k:cat,l:v.l,t})):all}
function generate(){
  const pool=getPool();
  const item=pool[Math.floor(Math.random()*pool.length)];
  last=item;shown++;
  const card=document.getElementById('card');
  card.classList.add('fade');
  setTimeout(()=>{
    card.innerHTML=`<div class="card-cat">${item.l}</div><div class="card-text">${item.t}</div>`;
    card.classList.remove('fade');
  },320);
  document.getElementById('counter').textContent=`Получено аффирмаций: ${shown}`;
  document.getElementById('savedMsg').style.display='none';
}
function saveAff(){
  if(!last){generate();return}
  const m=document.getElementById('savedMsg');
  m.style.display='block';
  setTimeout(()=>m.style.display='none',4500);
}
</script>
</body>
</html>
